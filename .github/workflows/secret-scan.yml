name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

# Vereist géén secrets — gebruikt alleen openbare tools.
permissions:
  contents: read

jobs:
  scan:
    name: Scan source + git history op secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (volledige history voor gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1. Onze eigen scanner over de current source tree.
      - name: Scan source tree (custom patterns)
        run: node scripts/scan-source-secrets.mjs

      # 2. gitleaks scant zowel current files als de hele git history.
      #    Open-source, gratis, geen secrets nodig.
      - name: Scan git history (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Gitleaks faalt build bij detectie. Geen aparte config nodig
        # voor onze use-case; gitleaks heeft default rules voor de
        # meeste providers (Stripe, OpenAI, AWS, Supabase, etc.).
